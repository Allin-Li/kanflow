name: Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  OWNER: allin-li # владелец пакетов в GHCR, обязательно в нижнем регистре

jobs:
  # ── Проверки (сборка фронта + типы). Гейт для всего остального ─
  checks:
    uses: ./.github/workflows/checks.yml

  # ── Сборка backend-образа и пуш в GHCR ──────────────────
  build-backend:
    needs: checks
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.OWNER }}/kanflow-backend:latest
            ${{ env.REGISTRY }}/${{ env.OWNER }}/kanflow-backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Деплой: статика фронта + перезапуск backend по SSH ──
  deploy:
    needs: [checks, build-backend]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend
        working-directory: frontend
        env:
          # Same-origin: фронт ходит на тот же домен, что и сам сайт.
          VITE_API_BASE: https://kanflow.allinli.ru
          VITE_WS_BASE: wss://kanflow.allinli.ru
        run: |
          npm ci
          npm run build
          test -f dist/index.html # страховка: не выкатываем пустую сборку

      - name: Setup SSH
        env:
          SSH_KEY: ${{ secrets.SSH_KEY }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "$SSH_HOST" >> ~/.ssh/known_hosts 2>/dev/null

      - name: Deploy frontend static
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
        run: |
          rsync -az --delete \
            -e "ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=yes" \
            frontend/dist/ "$SSH_USER@$SSH_HOST:/var/www/kanflow/"

      - name: Deploy backend
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
        run: |
          scp -i ~/.ssh/deploy_key -o StrictHostKeyChecking=yes \
            docker-compose.prod.yml "$SSH_USER@$SSH_HOST:/opt/kanflow/"
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=yes \
            "$SSH_USER@$SSH_HOST" '
              set -e
              cd /opt/kanflow
              docker compose -f docker-compose.prod.yml pull
              docker compose -f docker-compose.prod.yml up -d
              docker image prune -f
            '
